# cilium-values-1.19.4.yaml

# Kubernetes API Server qua Load Balancer HAProxy/VIP
kubeProxyReplacement: true
k8sServiceHost: 192.168.122.20
k8sServicePort: 6443

# Bật L7 proxy rõ ràng cho Gateway API/HTTPRoute
l7Proxy: true

# IPAM: dùng PodCIDR do Kubernetes/kube-controller-manager cấp cho Node
ipam:
  mode: kubernetes

# Native routing/direct routing
routingMode: native
autoDirectNodeRoutes: true
ipv4NativeRoutingCIDR: 10.244.0.0/16

# Bật Gateway API controller
gatewayAPI:
  enabled: true
  gatewayClass:
    create: false # |"auto"| -> Phien ban 1.19.4 dang loi tu dong tao CiliumGatewayClass, nen de false sau len # 1.20.0+ da fix loi nay, nen co the de true

# Bật L2 Announcement để quảng bá LoadBalancer IP trong LAN
# Dùng cho lab/on-prem khi chưa cấu hình BGP router/FRR đầy đủ
l2announcements:
  enabled: true

# Bật BGP Control Plane
# Chỉ có tác dụng khi tạo thêm các manifest BGP:
# CiliumBGPClusterConfig, CiliumBGPPeerConfig, CiliumBGPAdvertisement
bgpControlPlane:
  enabled: true

# Envoy dùng cho Gateway API/Ingress/L7
envoy:
  enabled: true
  securityContext:
    capabilities:
      keepCapNetBindService: true
      envoy:
        - NET_BIND_SERVICE
        - NET_ADMIN
        - SYS_ADMIN

# Tăng rate limit cho k8s client vì L2 Announcement dùng lease/leader election
# Lab nhỏ có thể để như này
k8sClientRateLimit:
  qps: 20
  burst: 40

# Debug chỉ nên bật khi lab/troubleshooting
debug:
  enabled: true


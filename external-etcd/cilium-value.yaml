# cilium-values-1.19.4.yaml

# Kubernetes API Server qua Load Balancer HAProxy/VIP
kubeProxyReplacement: true
k8sServiceHost: 192.168.122.20
k8sServicePort: 6443

# IPAM: dùng PodCIDR do Kubernetes/kube-controller-manager cấp cho Node
ipam:
  mode: kubernetes

# Native routing/direct routing
routingMode: native
autoDirectNodeRoutes: true
ipv4NativeRoutingCIDR: 10.244.0.0/16

# Bật Gateway API controller
gatewayAPI:
  enabled: true
  gatewayClass:
    create: "auto"

bgpControlPlane:
  enabled: true

# Envoy dùng cho Gateway API/Ingress/L7
envoy:
  enabled: true
  securityContext:
    capabilities:
      keepCapNetBindService: true
      envoy:
        - NET_BIND_SERVICE
        - NET_ADMIN
        - SYS_ADMIN

# Debug chỉ nên bật khi lab/troubleshooting
debug:
  enabled: true

# helm repo add cilium https://helm.cilium.io/
# helm repo update

# helm install cilium cilium/cilium \
#   --version 1.19.4 \
#   --namespace kube-system \
#   -f cilium-values-1.19.4.yaml